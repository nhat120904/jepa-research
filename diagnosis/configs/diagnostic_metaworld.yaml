# Primary diagnostic config: Metaworld 12-task subset
dataset:
  name: metaworld
  root: data/hf_mw/metaworld/data  # HF parquet dir (MetaworldHFDataset data_path = dir of train-*.parquet)
  external_root: external/jepa-wms
  image_size: 224
  action_dim: 4
  # NOTE: 03_extract_latents.py reads this from `dataset:` (not `eval:`).
  # 60 = quick diagnostic run; bump to 300 for the full thesis, then
  # `rm -f data/precomputed_latents/*.h5` to invalidate the cache.
  max_trajectories_per_task: 60
  # 12-task diagnostic subset spanning the difficulty spectrum.
  # NOTE: the HF dataset's `task` column uses the `mw-<name>` convention (no `-v2`
  # suffix) and the upstream MetaworldHFDataset filters by exact match, so names
  # below must match that column. `mw-window-open` is absent from the released
  # data (only `mw-window-close`), so the medium set uses window-close.
  tasks:
    easy:
      - mw-reach
      - mw-push
      - mw-pick-place
    medium:
      - mw-door-open
      - mw-door-close
      - mw-drawer-close
      - mw-button-press
      - mw-window-close
    hard:
      - mw-peg-insert-side
      - mw-assembly
      - mw-hammer
      - mw-stick-pull

models:
  - jepa_wm_metaworld
  - dino_wm_metaworld

negative_strategies:
  - random
  - opposite
  - hard_nn

regimes:
  - free_space
  - pre_grasp
  - gripper_actuation
  - contact_manipulation

cra:
  K: 16
  metrics: [top1, mrr]

ecs:
  # Calibrated per-model as the median of ||z_{t+1} - z_t|| on the eval set.
  # The runner computes this automatically; the value below is a fallback only.
  fallback_threshold: 0.5

hard_nn:
  pool_size: 256
  similarity_radius: 0.5
  K: 16

bootstrap:
  n_resamples: 1000
  ci: 0.95

eval:
  device: cuda
  batch_size: 16          # CRA samples K=16 negatives/transition; keep modest to avoid OOM
  num_workers: 4
  min_transitions_per_cell: 100

latent_cache:
  root: data/precomputed_latents
  compression: gzip

output:
  csv: results/metaworld_diagnostic.csv
