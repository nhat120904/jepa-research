# Sanity diagnostic: PointMaze point robot
dataset:
  name: point_maze
  root: data/point_maze/point_maze
  image_size: 224
  action_dim: 2
  external_root: external/jepa-wms
  max_transitions: 20000

models:
  - jepa_wm_pointmaze
  - dino_wm_pointmaze

negative_strategies:
  - random
  - opposite
  - hard_nn

regimes:
  - free_space

cra:
  K: 16
  metrics: [top1, mrr]

ecs:
  fallback_threshold: 1.0

hard_nn:
  pool_size: 256
  similarity_radius: 1.0
  K: 16

bootstrap:
  n_resamples: 1000
  ci: 0.95

eval:
  device: cuda
  batch_size: 32
  num_workers: 4
  min_transitions_per_cell: 100

latent_cache:
  root: data/precomputed_latents
  compression: gzip

output:
  csv: results/point_maze_diagnostic.csv
