# Secondary diagnostic: DROID real Franka
dataset:
  name: droid
  # DROIDVideoDataset reads `data_path` as the episode-paths CSV (not a dir).
  # Built by scripts/build_droid_paths.py from data/droid_subset/<lab>/success/...
  root: data/droid_subset/droid_paths.csv
  image_size: 256
  action_dim: 7
  # DROID actions are pose deltas plus signed gripper delta. Upstream planning
  # configs bound pose and gripper separately via max_norms [0.1, 0.75].
  action_l1_radius: 0.075
  action_l1_dims: [0, 1, 2, 3, 4, 5]
  pose_action_bound: 0.1
  gripper_action_range: [-0.75, 0.75]
  external_root: external/jepa-wms
  # Forwarded to DROIDVideoDataset. fps=4 + frames_per_clip=8 MATCH the upstream
  # DROID training config (droid_8fpcs_fps4_...): fps sets the pose-diff action
  # magnitude, which must match training (DROID action-norm is identity, so a
  # wrong fps would feed out-of-distribution action scales). 8 frames @ fps4 on
  # 60fps video needs ~120 source frames; build_droid_paths.py filters to that.
  dataset_kwargs:
    camera_views: ["wrist_mp4_path"]
    frames_per_clip: 8
    fps: 4
    seed: 0

# On the A5000 (24 GB) both VRAM-bound baselines run; this matches the paper's
# headline DROID comparison (DINO-WM vs V-JEPA-2-AC).
#   - dino_wm_droid    : DINOv2 ViT-S/14 — canonical DINO-WM baseline.
#   - vjepa2_ac_droid  : V-JEPA-2 ViT-G/16 (~1B) — fits 24 GB; run `03_extract_latents.py`
#                        for it first (its latent cache must exist before `05`/`08`).
#   - jepa_wm_droid    : still disabled — blocked by GATED DINOv3 ViT-L `.pth` weights
#                        (Meta request-form, HF mirror only ships safetensors). This is a
#                        licensing/format blocker, NOT hardware; see HANDOFF_DROID §1.
models:
  - dino_wm_droid
  - vjepa2_ac_droid

negative_strategies:
  - random
  - opposite
  - hard_nn
  - hard_effect      # similar state + most-different TRUE effect (Δz), prefers near actions

regimes:
  - free_space
  - pre_grasp
  - gripper_actuation
  - contact_manipulation

cra:
  K: 16
  metrics: [top1, mrr]

ecs:
  fallback_threshold: 1.0

hard_nn:
  pool_size: 512
  similarity_radius: 1.0
  K: 16

# hard_effect: among similar-state pool candidates (reuses hard_nn.pool_size and
# similarity_radius), score by ||Δz_cand - Δz_factual|| - action_penalty·||a_cand - a_factual||
# (both terms std-normalized). Higher action_penalty = more weight on picking a
# near-by action (a stricter "precise action matters" test); 0 = pure max-effect-divergence.
hard_effect:
  action_penalty: 0.5

bootstrap:
  n_resamples: 1000
  ci: 0.95

# Planning Action-Score probe (scripts/08_planning_probe.py). Values mirror the
# upstream DROID dino-wm L2_cem config exactly
# (configs/evals/.../droid/dino-wm/droid_L2_cem_sourcedset_H3_nas3_maxnorm01_ctxt2_gH3_*.yaml):
#   CEM iter 15, 300 samples, 10 elites, horizon/goal_H 3, var_scale 0.1, momentum 0,
#   max_norms [0.1, 0.75] over dims [[0..5],[6]], objective L2 (MSE to goal, last frame).
# max_planning_transitions bounds CEM cost (num_samples*iterations unrolls per transition).
# On the A5000 you can raise it to cover every transition in a regime (each DROID regime has
# only ~380–1010); 200 is already most/all of the smaller cells. Lower only for a quick smoke.
planning:
  goal_H: 3
  iterations: 15
  num_samples: 300
  num_elites: 10
  var_scale: 0.1
  max_norms: [0.1, 0.75]
  max_norm_dims: [[0, 1, 2, 3, 4, 5], [6]]
  max_planning_transitions: 1100

eval:
  # Latents are already cached (03 done) for dino_wm_droid; only 05/08 need the
  # model forward. Run on the A5000 GPU (`cuda`); `cpu` still works off the cache if needed.
  device: cuda
  batch_size: 16          # CRA hard negatives expand to B*K predictions; ample on 24 GB
  num_workers: 4
  max_transitions: 50000
  min_transitions_per_cell: 100

latent_cache:
  root: data/precomputed_latents
  compression: gzip

output:
  csv: results/droid_diagnostic.csv
